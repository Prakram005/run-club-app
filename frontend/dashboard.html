<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Run Club</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* page-level additions only */
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.75rem 0;
    }
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--success);
      border-radius: 50%;
      margin-right: 5px;
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(52,217,138,.5); }
      50%     { opacity:.7; box-shadow: 0 0 0 4px transparent; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav>
    <a href="events.html" class="nav-logo">RUN<span>CLUB</span></a>
    <div class="nav-links">
      <a href="events.html">Events</a>
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="index.html" id="logout-btn" style="color:var(--danger)">Log out</a>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main class="page">

    <div class="user-greeting" id="user-greeting">Welcome back</div>
    <h1 class="page-title">My Dashboard</h1>
    <p class="page-subtitle">Your runs, your crew.</p>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-joined">—</div>
        <div class="stat-label">Events Joined</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-upcoming-joined">—</div>
        <div class="stat-label">Upcoming (Mine)</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-all-live">—</div>
        <div class="stat-label">
          <span class="live-dot"></span>Live Events
        </div>
      </div>
    </div>

    <!-- My joined events -->
    <div class="section-header">
      <div class="section-title">Events I've Joined</div>
      <a href="events.html" class="btn btn-ghost btn-sm">Browse all →</a>
    </div>
    <div id="my-events-container">
      <div class="loading"><div class="spinner"></div> Loading…</div>
    </div>

    <hr class="section-divider" />

    <!-- All upcoming -->
    <div class="section-header">
      <div class="section-title">
        <span class="live-dot"></span> All Upcoming Events
      </div>
    </div>
    <div id="all-events-container">
      <div class="loading"><div class="spinner"></div> Loading…</div>
    </div>

  </main>

  <div id="toast-container"></div>

  <script src="api.js"></script>
  <script src="dashboard.js"></script>
  <script>
    /* auth guard */
    if (!localStorage.getItem('token')) window.location.href = 'index.html';

    /* logout */
    document.getElementById('logout-btn').addEventListener('click', e => {
      e.preventDefault();
      localStorage.clear();
      window.location.href = 'index.html';
    });

    /* greet user */
    const _u = JSON.parse(localStorage.getItem('user') || '{}');
    if (_u.name) {
      document.getElementById('user-greeting').textContent = `Hey, ${_u.name} 👋`;
    }
  </script>

</body>
</html>
