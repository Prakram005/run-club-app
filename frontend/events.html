<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Events — Run Club</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      transform: translateY(20px);
      transition: transform 0.25s ease;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .modal-close {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .modal-close:hover { color: var(--text); border-color: var(--text-muted); }

    .modal-form { display: flex; flex-direction: column; gap: 1rem; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group textarea {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent); }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--text-dim); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .btn-full { width: 100%; justify-content: center; padding: 0.75rem; font-size: 0.95rem; }

    .page-topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .form-error {
      font-size: 0.8rem;
      color: var(--danger);
      min-height: 1rem;
    }
  </style>
</head>
<body>

  <nav>
    <a href="events.html" class="nav-logo">Run<span>Club</span></a>
    <div class="nav-links">
      <a href="events.html" class="active">Events</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="index.html" id="logout-btn" style="color:var(--danger)">Log out</a>
    </div>
  </nav>

  <main class="page">
    <div class="page-topbar">
      <div>
        <h1 class="page-title">Upcoming Events</h1>
        <p class="page-subtitle" style="margin-bottom:0">Find a run. Join the crew. Show up.</p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Create Event</button>
    </div>

    <div id="events-container">
      <div class="loading">
        <div class="spinner"></div>
        Loading events…
      </div>
    </div>
  </main>

  <!-- CREATE EVENT MODAL -->
  <div class="modal-overlay" id="create-modal" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Create a New Event</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <form class="modal-form" onsubmit="handleCreateEvent(event)">
        <div class="form-group">
          <label>Event Title *</label>
          <input type="text" id="ev-title" placeholder="e.g. Sunday Morning 5K" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="ev-date" required />
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="time" id="ev-time" />
          </div>
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" id="ev-location" placeholder="e.g. Central Park Gate 5" />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="ev-description" placeholder="What's the vibe? Pace? Distance?"></textarea>
        </div>

        <div class="form-group">
          <label>Max Participants</label>
          <input type="number" id="ev-max" placeholder="20" min="1" max="500" />
        </div>

        <div class="form-error" id="create-error"></div>

        <button type="submit" class="btn btn-primary btn-full" id="create-btn">
          Create Event 🏃
        </button>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="api.js"></script>
  <script src="events.js"></script>
  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    function openModal() {
      document.getElementById('create-modal').classList.add('open');
      document.getElementById('ev-date').min = new Date().toISOString().split('T')[0];
    }

    function closeModal() {
      document.getElementById('create-modal').classList.remove('open');
      document.getElementById('create-error').textContent = '';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('create-modal')) closeModal();
    }

    async function handleCreateEvent(e) {
      e.preventDefault();
      const btn = document.getElementById('create-btn');
      const errEl = document.getElementById('create-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Creating…';

      const dateVal = document.getElementById('ev-date').value;
      const timeVal = document.getElementById('ev-time').value || '07:00';

      try {
        await api.createEvent({
          title: document.getElementById('ev-title').value.trim(),
          date: new Date(`${dateVal}T${timeVal}`).toISOString(),
          location: document.getElementById('ev-location').value.trim(),
          description: document.getElementById('ev-description').value.trim(),
          maxParticipants: parseInt(document.getElementById('ev-max').value) || 20,
        });

        showToast('Event created! 🎉', 'success');
        closeModal();
        e.target.reset();
        loadEvents();
      } catch (err) {
        errEl.textContent = err.message || 'Failed to create event.';
        if (err.message === 'Invalid token' || err.message === 'No token, access denied') {
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 800);
        }
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Event 🏃';
      }
    }

    document.getElementById('logout-btn').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.clear();
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
