<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Events — Run Club</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── NAV ── -->
  <nav>
    <a href="events.html" class="nav-logo">RUN<span>CLUB</span></a>
    <div class="nav-links">
      <a href="events.html" class="active">Events</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="index.html" id="logout-btn" style="color:var(--danger)">Log out</a>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main class="page">

    <div class="page-topbar">
      <div>
        <div class="page-eyebrow">Community</div>
        <h1 class="page-title">Upcoming Events</h1>
        <p class="page-subtitle" style="margin-bottom:0">
          Find a run. Join the crew. Show up.
        </p>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()">+ Create Event</button>
    </div>

    <!-- Search + Sort -->
    <div class="controls-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          class="search-input"
          type="text"
          id="search-input"
          placeholder="Search by title or location…"
          oninput="renderEvents(allEventsCache)"
        />
      </div>
      <select class="sort-select" id="sort-select" onchange="renderEvents(allEventsCache)">
        <option value="asc">Date ↑ Earliest</option>
        <option value="desc">Date ↓ Latest</option>
      </select>
    </div>

    <div id="events-container">
      <div class="loading"><div class="spinner"></div> Loading events…</div>
    </div>

  </main>

  <!-- ── CREATE EVENT MODAL ── -->
  <div class="modal-overlay" id="create-modal"
       onclick="if(event.target===this)closeCreateModal()">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Create Event</div>
        <button class="modal-close" onclick="closeCreateModal()">✕</button>
      </div>

      <form class="modal-form" onsubmit="handleCreateEvent(event)">
        <div class="form-group">
          <label>Event Title *</label>
          <input type="text" id="ev-title"
                 placeholder="e.g. Sunday Morning 5K" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="ev-date" required />
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="time" id="ev-time" />
          </div>
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" id="ev-location"
                 placeholder="e.g. Central Park Gate 5" />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="ev-description"
                    placeholder="Pace, distance, what to bring…"></textarea>
        </div>

        <div class="form-group">
          <label>Max Participants</label>
          <input type="number" id="ev-max" placeholder="20" min="1" max="500" />
        </div>

        <div class="form-error" id="create-error"></div>

        <button type="submit" class="btn btn-primary btn-full" id="create-btn">
          Create Event 🏃
        </button>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="api.js"></script>
  <script src="events.js"></script>
  <script>
    /* auth guard */
    if (!localStorage.getItem('token')) window.location.href = 'index.html';

    /* logout */
    document.getElementById('logout-btn').addEventListener('click', e => {
      e.preventDefault();
      localStorage.clear();
      window.location.href = 'index.html';
    });

    /* modal helpers */
    function openCreateModal() {
      document.getElementById('ev-date').min = new Date().toISOString().split('T')[0];
      document.getElementById('create-modal').classList.add('open');
    }
    function closeCreateModal() {
      document.getElementById('create-modal').classList.remove('open');
      document.getElementById('create-error').textContent = '';
    }

    /* create event */
    async function handleCreateEvent(e) {
      e.preventDefault();
      const btn   = document.getElementById('create-btn');
      const errEl = document.getElementById('create-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent  = 'Creating…';

      const dateVal = document.getElementById('ev-date').value;
      const timeVal = document.getElementById('ev-time').value || '07:00';

      try {
        await api.createEvent({
          title:           document.getElementById('ev-title').value.trim(),
          date:            new Date(`${dateVal}T${timeVal}`).toISOString(),
          location:        document.getElementById('ev-location').value.trim(),
          description:     document.getElementById('ev-description').value.trim(),
          maxParticipants: parseInt(document.getElementById('ev-max').value) || 20,
        });

        showToast('Event created! 🎉', 'success');
        closeCreateModal();
        e.target.reset();
        loadEvents();
      } catch (err) {
        errEl.textContent = err.message || 'Failed to create event.';
        if (err.message === 'Invalid token' || err.message === 'No token, access denied') {
          setTimeout(() => window.location.href = 'index.html', 800);
        }
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Create Event 🏃';
      }
    }
  </script>

</body>
</html>
