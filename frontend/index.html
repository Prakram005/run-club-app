<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Run Club — Welcome</title>
  <link rel="stylesheet" href="style.css" />
</head>

<!-- auth-page-body applies the centred layout + ambient glows -->
<body class="auth-page-body">

  <div class="auth-box">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-text">RUN<span>CLUB</span></div>
      <div class="tagline">Find your pace · Find your people</div>
    </div>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tab switcher -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Log In</button>
        <button class="tab-btn"        onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <form class="auth-form visible" id="login-form"
            onsubmit="handleLogin(event)" autocomplete="off">

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email"
                 placeholder="you@example.com" required autocomplete="off" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password"
                 placeholder="••••••••" required autocomplete="new-password" />
        </div>

        <div class="form-error" id="login-error"></div>

        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Log In →
        </button>
      </form>

      <!-- SIGNUP -->
      <form class="auth-form" id="signup-form"
            onsubmit="handleSignup(event)" autocomplete="off">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name"
                 placeholder="Your name" required autocomplete="off" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email"
                 placeholder="you@example.com" required autocomplete="off" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password"
                 placeholder="Min. 6 characters" required minlength="6"
                 autocomplete="new-password" />
        </div>

        <div class="form-error" id="signup-error"></div>

        <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
          Create Account →
        </button>
      </form>

      <!-- Footer -->
      <div class="auth-footer" id="auth-footer">
        No account? <a href="#" onclick="switchTab('signup');return false;">Sign up free</a>
      </div>

    </div><!-- /auth-card -->
  </div><!-- /auth-box -->

  <div id="toast-container"></div>

  <script src="api.js"></script>
  <script>
    /* redirect if already logged in */
    if (localStorage.getItem('token')) window.location.href = 'events.html';

    /* ── Tab switcher ── */
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').classList.toggle('visible', isLogin);
      document.getElementById('signup-form').classList.toggle('visible', !isLogin);
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', isLogin ? i === 0 : i === 1);
      });
      document.getElementById('auth-footer').innerHTML = isLogin
        ? `No account? <a href="#" onclick="switchTab('signup');return false;">Sign up free</a>`
        : `Already a member? <a href="#" onclick="switchTab('login');return false;">Log in</a>`;
      document.getElementById('login-error').textContent  = '';
      document.getElementById('signup-error').textContent = '';
    }

    /* ── Login ── */
    async function handleLogin(e) {
      e.preventDefault();
      const btn   = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent  = 'Logging in…';

      try {
        const data = await api.login({
          email:    document.getElementById('login-email').value.trim(),
          password: document.getElementById('login-password').value,
        });

        localStorage.setItem('token', data.token);
        if (data.user) localStorage.setItem('user', JSON.stringify(data.user));

        showToast('Welcome back! 👟', 'success');
        setTimeout(() => window.location.href = 'events.html', 750);
      } catch (err) {
        errEl.textContent = err.message || 'Login failed. Check your credentials.';
        btn.disabled    = false;
        btn.textContent = 'Log In →';
      }
    }

    /* ── Signup ── */
    async function handleSignup(e) {
      e.preventDefault();
      const btn   = document.getElementById('signup-btn');
      const errEl = document.getElementById('signup-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent  = 'Creating account…';

      try {
        await api.register({
          name:     document.getElementById('signup-name').value.trim(),
          email:    document.getElementById('signup-email').value.trim(),
          password: document.getElementById('signup-password').value,
        });

        showToast('Account created! Please log in.', 'success');
        setTimeout(() => switchTab('login'), 900);
      } catch (err) {
        errEl.textContent = err.message || 'Sign up failed. Try again.';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Create Account →';
      }
    }

    /* ── Toast ── */
    function showToast(message, type = 'info') {
      const c     = document.getElementById('toast-container');
      const icons = { success: '✓', error: '✕', info: 'ℹ' };
      const el    = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<span>${icons[type]}</span> ${message}`;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3200);
    }
  </script>

</body>
</html>
