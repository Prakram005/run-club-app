<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Run Club — Welcome</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* Animated background dots */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(232,255,71,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,255,71,0.07), transparent 70%);
      pointer-events: none;
      animation: drift 8s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: translate(0,0); }
      to   { transform: translate(80px, 60px); }
    }

    /* Auth box */
    .auth-box {
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.4s ease both;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
    }

    .auth-logo .logo-text span { color: var(--text); }

    .auth-logo .tagline {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    /* Card */
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 1.75rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.6rem;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 6px rgba(0,0,0,0.3);
    }

    /* Forms */
    .auth-form { display: none; flex-direction: column; gap: 1rem; }
    .auth-form.visible { display: flex; animation: fadeUp 0.2s ease; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .form-group input:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--text-dim); }

    .form-error {
      font-size: 0.8rem;
      color: var(--danger);
      min-height: 1rem;
      margin-top: -0.25rem;
    }

    .btn-full {
      width: 100%;
      justify-content: center;
      padding: 0.75rem;
      font-size: 0.95rem;
      margin-top: 0.5rem;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.25rem 0;
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-text">Run<span>Club</span></div>
      <div class="tagline">Find your pace. Find your people.</div>
    </div>

    <div class="auth-card">
      <!-- Tabs -->
      <div class="tabs">
        <button type="button" class="tab-btn active" onclick="switchTab('login')">Log In</button>
        <button type="button" class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <form class="auth-form visible" id="login-form" onsubmit="handleLogin(event)" autocomplete="off">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="off" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="new-password" />
        </div>
        <div class="form-error" id="login-error"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Log In →
        </button>
      </form>

      <!-- SIGNUP FORM -->
       
      <form class="auth-form" id="signup-form" onsubmit="handleSignup(event)" autocomplete="off">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Your name" required autocomplete="off" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="off" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password" />
        </div>

        <div class="form-error" id="signup-error"></div>
        
        <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
          Create Account →
        </button>
      </form>

      <div class="auth-footer" id="auth-footer">
        Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up free</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="api.js"></script>
  <script>
    // ── Tab switching ──────────────────────────
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('login-form').classList.toggle('visible', isLogin);
      document.getElementById('signup-form').classList.toggle('visible', !isLogin);
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', isLogin ? i === 0 : i === 1);
      });
      document.getElementById('auth-footer').innerHTML = isLogin
        ? `Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up free</a>`
        : `Already have an account? <a href="#" onclick="switchTab('login')">Log in</a>`;
      document.getElementById('login-error').textContent = '';
      document.getElementById('signup-error').textContent = '';
    }

    // ── Login ──────────────────────────────────
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Logging in…';

      try {
        const data = await api.login({
          email: document.getElementById('login-email').value.trim(),
          password: document.getElementById('login-password').value,
        });

        // Store token + user info
        localStorage.setItem('token', data.token);
        if (data.user) localStorage.setItem('user', JSON.stringify(data.user));

        showToast('Welcome back! 👟', 'success');
        setTimeout(() => window.location.href = 'events.html', 800);
      } catch (err) {
        errEl.textContent = err.message || 'Login failed. Check your credentials.';
        btn.disabled = false;
        btn.textContent = 'Log In →';
      }
    }

    // ── Signup ─────────────────────────────────
    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      const errEl = document.getElementById('signup-error');
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        await api.register({
          name: document.getElementById('signup-name').value.trim(),
          email: document.getElementById('signup-email').value.trim(),
          password: document.getElementById('signup-password').value,
        });

        showToast('Account created! Please log in.', 'success');
        setTimeout(() => switchTab('login'), 1000);
      } catch (err) {
        errEl.textContent = err.message || 'Sign up failed. Try again.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account →';
      }
    }

    // ── Toast ──────────────────────────────────
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const icons = { success: '✓', error: '✕', info: 'ℹ' };
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${icons[type]}</span> ${message}`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // If already logged in, skip to events
    if (localStorage.getItem('token') && localStorage.getItem('token') !== 'demo-token') {
      window.location.href = 'events.html';
    }
  </script>
</body>
</html>
